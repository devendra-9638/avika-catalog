<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Add New Product</h2>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="text" name="name" class="form-control form-control-lg" placeholder="Product Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="number" name="price" class="form-control form-control-lg" placeholder="Price (₹)" step="0.01" min="0.01" required>
                    </div>
                    <div class="mb-3">
                        <input type="file" name="file" class="form-control form-control-lg" multiple accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Add Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
